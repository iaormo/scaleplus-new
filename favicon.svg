<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="rg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="fl" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Rocket body -->
  <path d="M32 8c-2 6-3 12-3 18 0 8 1.5 14 3 18 1.5-4 3-10 3-18 0-6-1-12-3-18z" fill="url(#rg)" stroke="#c084fc" stroke-width="0.5"/>
  <!-- Nose cone highlight -->
  <path d="M32 8c-1 3-1.8 7-2 11 1.2-1 2.8-1 4 0-.2-4-1-8-2-11z" fill="#e9d5ff" opacity="0.3"/>
  <!-- Left fin -->
  <path d="M29 36c-4 3-8 4-11 4 2-4 5-7 8-9z" fill="url(#rg)" opacity="0.85"/>
  <!-- Right fin -->
  <path d="M35 36c4 3 8 4 11 4-2-4-5-7-8-9z" fill="url(#rg)" opacity="0.85"/>
  <!-- Window -->
  <circle cx="32" cy="24" r="3.5" fill="#0a0a0a" stroke="#c084fc" stroke-width="1"/>
  <circle cx="32" cy="24" r="2" fill="#1e1b4b" opacity="0.8"/>
  <circle cx="31" cy="23" r="0.8" fill="#e9d5ff" opacity="0.6"/>
  <!-- Flame -->
  <path d="M30 44c0 4 1 8 2 12 1-4 2-8 2-12" fill="url(#fl)" opacity="0.9"/>
  <path d="M30.8 44c0 3 0.6 5.5 1.2 8 0.6-2.5 1.2-5 1.2-8" fill="#fbbf24" opacity="0.7"/>
  <!-- Exhaust particles -->
  <circle cx="30" cy="54" r="1" fill="#f97316" opacity="0.4"/>
  <circle cx="34" cy="53" r="0.8" fill="#ef4444" opacity="0.3"/>
  <circle cx="32" cy="56" r="1.2" fill="#f97316" opacity="0.25"/>
</svg>
