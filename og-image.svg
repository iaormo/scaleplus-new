<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Decorative orb top-right -->
  <circle cx="950" cy="130" r="180" fill="#a855f7" opacity="0.04"/>
  <circle cx="950" cy="130" r="100" fill="#a855f7" opacity="0.03"/>

  <!-- Decorative orb bottom-left -->
  <circle cx="200" cy="520" r="140" fill="#7c3aed" opacity="0.04"/>

  <!-- Favicon icon (rocket) scaled and placed -->
  <g transform="translate(520, 155) scale(1.6)" opacity="0.9">
    <rect width="64" height="64" rx="14" fill="#0a0a0a" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.3"/>
    <g transform="translate(12, 8) scale(0.62)">
      <path d="M40.28,11.32a4,4,0,0,0-5.66,0L22.24,23.7A32,32,0,0,0,13,47.44V56a8,8,0,0,0,8,8h8.56A32,32,0,0,0,53.3,54.76L65.68,42.38a4,4,0,0,0,0-5.66ZM47,49.12A24,24,0,0,1,29.56,56H21V47.44A24,24,0,0,1,27.88,30L37,20.87,56.13,40Z" fill="#a855f7"/>
      <circle cx="44" cy="33" r="5" fill="#c084fc"/>
      <path d="M24,44a4,4,0,0,1-4,4H12a4,4,0,0,1,0-8h8A4,4,0,0,1,24,44Z" fill="#a855f7" opacity="0.6"/>
      <path d="M20,52a4,4,0,0,1-4,4H8a4,4,0,0,1,0-8h8A4,4,0,0,1,20,52Z" fill="#a855f7" opacity="0.4"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="600" y="320" text-anchor="middle" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="80" letter-spacing="-2">
    <tspan fill="#ffffff">Scale</tspan><tspan fill="url(#textGrad)">Plus</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="375" text-anchor="middle" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="26" fill="#a1a1aa" letter-spacing="0.5">
    AI Automation &amp; Business Systems Agency
  </text>

  <!-- Accent line -->
  <rect x="510" y="405" width="180" height="2.5" rx="1.25" fill="url(#accent)" opacity="0.5"/>

  <!-- Services tags -->
  <g font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="500">
    <rect x="295" y="440" width="130" height="34" rx="17" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
    <text x="360" y="462" text-anchor="middle" fill="#c084fc">AI Chatbots</text>

    <rect x="445" y="440" width="130" height="34" rx="17" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
    <text x="510" y="462" text-anchor="middle" fill="#c084fc">Automation</text>

    <rect x="595" y="440" width="155" height="34" rx="17" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
    <text x="672.5" y="462" text-anchor="middle" fill="#c084fc">Web Dev</text>

    <rect x="770" y="440" width="135" height="34" rx="17" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
    <text x="837.5" y="462" text-anchor="middle" fill="#c084fc">CRM Systems</text>
  </g>

  <!-- URL at bottom -->
  <text x="600" y="555" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-weight="400" font-size="16" fill="#71717a" letter-spacing="1">
    scaleplus.io
  </text>

  <!-- Top/bottom edge lines -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.3"/>
  <rect x="0" y="628" width="1200" height="2" fill="url(#accent)" opacity="0.15"/>
</svg>
